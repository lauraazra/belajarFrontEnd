<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spread</title>
    <style>
        body {
            background-color: salmon;
            text-align: center;
            font-family: Arial, Helvetica, sans-serif;
        }

        li {
            margin-top: 10px;
        }

        span {
            display: inline-block;
            transition: .3s;
        }

        li span.badge:hover {
            transform: scale(2);
        }

        h2 {
            font-size: 80px;
            color: white;
        }

        h2 span.nama:hover {
            transform: scale(1.5)translateY(-20px);
        }
    </style>
</head>

<body>
    <ul type="none">
        <li>Azra</li>
        <li>Fahmi</li>
        <li>Bayu</li>
    </ul>
    <h2>Samudra</h2>
    <script src="spread.js"></script>
</body>

</html>
