        // Interaktivitas dengan state atau event handler
        function Header({name}){return (<h1>Belajar React bareng {name ? name : "Alvar"} 🚀</h1>)}
    
        function HomePage(){
            const students = ['Alvar', 'Azra', 'Pradipta']
            const [likes, setLikes] = React.useState(0)

            function handleClick() { 
                setLikes(likes+1)
            }

            return(
                <div>
                    <Header />
                    <Header name="WPU" />
                    <Header name="Azra" />

                    <ul>
                        {students.map((student) => (
                            <li key={student}>{student}</li>
                        ))}
                    </ul>

                    <button onClick={handleClick}>Like ({likes})</button>
                </div>
                
            )
        }
        root.render(<HomePage />)
