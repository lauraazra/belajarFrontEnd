<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Belajar React</title>

<body>

    <script type="text/jsx">
        const container = document.getElementById('root')
        const root = ReactDOM.createRoot(container)
        root.render(<h1>Belajar React bareng WPU 🚀</h1>)
        
        // jadi error, karena h1 bukan js tapi jsx, dan defaultnya browser ga kenal jsx, makannya butuh compiler buat nerjemahin.
        // tambahin unpkg react, dan typenya jadi jsx
    </script>
